<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270" role="img" aria-labelledby="title desc">
  <title id="title">Defensive JPEG decoder layers</title>
  <desc id="desc">Untrusted bytes pass through resource limits, bounded segments, syntax validation, entropy validation, and finally pixel allocation.</desc>
  <rect width="900" height="270" rx="16" fill="#f6f7f9"/>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#626a73"/></marker></defs>
  <g font-family="system-ui,sans-serif" fill="#202124" text-anchor="middle">
    <g><rect x="20" y="70" width="130" height="90" rx="10" fill="#f9e2ea" stroke="#ad7185"/><text x="85" y="105" font-size="17" font-weight="600">untrusted</text><text x="85" y="132" font-size="14">JPEG bytes</text></g>
    <g><rect x="180" y="70" width="130" height="90" rx="10" fill="#fff0d8" stroke="#b49059"/><text x="245" y="102" font-size="17" font-weight="600">resource</text><text x="245" y="126" font-size="14">byte + pixel</text><text x="245" y="146" font-size="14">limits</text></g>
    <g><rect x="340" y="70" width="130" height="90" rx="10" fill="#e8e5ff" stroke="#8c82bd"/><text x="405" y="102" font-size="17" font-weight="600">bounded</text><text x="405" y="126" font-size="14">segment</text><text x="405" y="146" font-size="14">cursors</text></g>
    <g><rect x="500" y="70" width="130" height="90" rx="10" fill="#dcecff" stroke="#6b91bd"/><text x="565" y="102" font-size="17" font-weight="600">baseline</text><text x="565" y="126" font-size="14">tables + MCU</text><text x="565" y="146" font-size="14">invariants</text></g>
    <g><rect x="660" y="70" width="100" height="90" rx="10" fill="#e2f4e7" stroke="#70a17b"/><text x="710" y="105" font-size="17" font-weight="600">entropy</text><text x="710" y="132" font-size="14">codes</text></g>
    <g><rect x="790" y="70" width="90" height="90" rx="10" fill="#e5e8eb" stroke="#777f87"/><text x="835" y="105" font-size="17" font-weight="600">pixels</text><text x="835" y="132" font-size="14">or error</text></g>
    <text x="450" y="215" font-size="14" fill="#5d646b">Every rejected layer returns JpegError before the next layer can trust its values.</text>
  </g>
  <g stroke="#626a73" stroke-width="3" marker-end="url(#a)"><path d="M150 115h28"/><path d="M310 115h28"/><path d="M470 115h28"/><path d="M630 115h28"/><path d="M760 115h28"/></g>
</svg>
