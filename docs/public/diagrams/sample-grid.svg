<svg xmlns="http://www.w3.org/2000/svg" width="760" height="270" viewBox="0 0 760 270" role="img" aria-labelledby="title desc">
  <title id="title">An image as sample values</title>
  <desc id="desc">A four by four grayscale grid maps numbers from zero to 255 onto dark through light squares.</desc>
