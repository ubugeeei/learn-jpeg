<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" role="img" aria-labelledby="title desc">
  <title id="title">JPEG compression pipeline</title>
  <desc id="desc">Pixels flow through eight by eight blocks, DCT, quantization, zig-zag ordering, Huffman coding, and a JPEG file.</desc>
  <rect width="900" height="250" rx="16" fill="#f6f7f9"/>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#626a73"/></marker></defs>
  <g font-family="system-ui, sans-serif" text-anchor="middle" fill="#202124">
    <g><rect x="25" y="65" width="120" height="85" rx="12" fill="#dcecff" stroke="#6b91bd"/><text x="85" y="101" font-size="18" font-weight="600">pixels</text><text x="85" y="126" font-size="14">0…255</text></g>
    <g><rect x="175" y="65" width="120" height="85" rx="12" fill="#e8e5ff" stroke="#8c82bd"/><text x="235" y="101" font-size="18" font-weight="600">8×8 blocks</text><text x="235" y="126" font-size="14">small tiles</text></g>
    <g><rect x="325" y="65" width="120" height="85" rx="12" fill="#e2f4e7" stroke="#70a17b"/><text x="385" y="101" font-size="18" font-weight="600">DCT</text><text x="385" y="126" font-size="14">frequencies</text></g>
    <g><rect x="475" y="65" width="120" height="85" rx="12" fill="#fff0d8" stroke="#b49059"/><text x="535" y="101" font-size="18" font-weight="600">quantize</text><text x="535" y="126" font-size="14">round detail</text></g>
    <g><rect x="625" y="65" width="120" height="85" rx="12" fill="#f9e2ea" stroke="#ad7185"/><text x="685" y="101" font-size="18" font-weight="600">Huffman</text><text x="685" y="126" font-size="14">short codes</text></g>
    <g><rect x="775" y="65" width="100" height="85" rx="12" fill="#e5e8eb" stroke="#777f87"/><text x="825" y="101" font-size="18" font-weight="600">JPEG</text><text x="825" y="126" font-size="14">bytes</text></g>
    <text x="385" y="190" font-size="14" fill="#356642">reversible in principle</text>
    <text x="535" y="190" font-size="14" fill="#8a5b15">intentional loss happens here</text>
  </g>
  <g stroke="#626a73" stroke-width="3" marker-end="url(#a)"><path d="M145 107h28"/><path d="M295 107h28"/><path d="M445 107h28"/><path d="M595 107h28"/><path d="M745 107h28"/></g>
</svg>
